<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="css-reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tic Tac Toe</h1>

    <div class="players-names-container">
        <div class="player-1">
            <input class="players-input" id="player1" type="text" placeholder="Player 1">
        </div>
        <div class="start-btn-container">
            <button class="start-btn">Start</button>
        </div>
        <div class="player-2">
            <input class="players-input" id="player2" type="text" placeholder="Player 2">
        </div>
    </div>

    <div class="main">

        <div class="game-container">
            <div class="row">
                <button class="cell"></button>
                <button class=" cell column"></button>
                <button class="cell"></button>
            </div>
            <div class="row">
                <button class="cell"></button>
                <button class="cell column"></button>
                <button class="cell"></button>
            </div>
            <div class="row">
                <button class="cell"></button>
                <button class="cell column"></button>
                <button class="cell"></button>
            </div>
        </div>

        <div class="information-container">
            
            <div class="winner-container">
                <p class="winner"></p>
            </div>

            <button class="restart-btn">Restart</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
